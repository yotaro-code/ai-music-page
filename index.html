<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Page - Rap Vibes</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            color: #ffffff;
        }
        header {
            text-align: center;
            padding: 20px;
            background: #262626;
            font-size: 1.8rem;
            font-weight: bold;
            border-bottom: 3px solid #00ffcc;
        }
        main {
            text-align: center;
            padding: 40px;
        }

        /* 👇 ここ追加 */
        .cover {
            width: 100%;
            max-width: 350px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        audio {
            margin-top: 20px;
            border: 3px solid #00ffcc;
            border-radius: 5px;
            width: 100%;
            max-width: 350px;
        }

        .description {
            margin: 20px auto;
            font-size: 1.2rem;
            color: #aaaaaa;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <header>
        🎤 Welcome to AI Music - Rap Vibes 🎶
    </header>
    <main>
        <p class="description">
            ヒップホップのビートを感じてみよう。ここではAIに選ばれた「イケてる」ラップナンバーを紹介しています。
        </p>

        <!-- 👇 ここ追加 -->
        <img src="98BDFF15-F549-44CC-AA40-CC05580BD971.png" class="cover">

        <audio controls>
            <source src="music.mp3" type="audio/mpeg">
            ご使用のブラウザでは audio タグがサポートされていません。
        </audio>
    </main>
</body>
</html>
